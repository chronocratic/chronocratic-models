name: Sync dev after main merge

on:
  pull_request:
    branches: [main]
    types: [closed]

concurrency:
  group: sync-dev
  cancel-in-progress: false

jobs:
  sync-dev:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'dev'
    runs-on: ubuntu-latest
    environment: dev-sync
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.DEV_FORCE_PUSH_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Backup dev
        run: git branch dev.backup.$(date +%Y%m%d-%H%M%S) origin/dev

      - name: Sync dev to main
        run: |
          git checkout dev
          git reset --hard origin/main
          git push origin dev --force-with-lease

      - name: Clean up old backups
        run: |
          git fetch --prune origin
          git branch -r | grep 'origin/dev.backup' | sort | head -n -5 | sed 's|origin/||' | xargs -I {} git push origin --delete {} || true
